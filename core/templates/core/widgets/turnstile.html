<!-- Cloudflare Turnstile Widget -->
<div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}" data-theme="light"></div>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<input type="hidden" id="cf-turnstile-response" name="turnstile_response" value="">
<script>
    // Handle Turnstile verification
    document.addEventListener('DOMContentLoaded', function() {
        // Update hidden field when verification completes
        window.turnstileCallback = function() {
            var response = turnstile.getResponse();
            document.getElementById('cf-turnstile-response').value = response;
            return response;
        };
    });
</script>
